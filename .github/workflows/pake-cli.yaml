name: Build App With Pake CLI (Debug Mode)

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "windows-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      debug:
        description: "Enable debug mode (devtools)"
        type: boolean
        default: true
      width:
        description: "Window width (px)"
        required: false
        default: "1200"
      height:
        description: "Window height (px)"
        required: false
        default: "780"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm)"
        required: false
        default: "dmg"

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      # ========== Windows 平台特殊处理 ==========
      - name: Force enable DevTools and fix Blob download (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "🔧 Patching Windows build for DevTools and Blob download..." -ForegroundColor Green
          
          # 1. 修改 Tauri 配置强制开启开发者工具
          $configFile = "src-tauri/tauri.conf.json"
          if (Test-Path $configFile) {
            $config = Get-Content $configFile -Raw | ConvertFrom-Json
            
            # 确保 windows 数组存在
            if ($null -eq $config.tauri.windows -or $config.tauri.windows.Count -eq 0) {
              Write-Host "⚠️  Windows array not found, skipping..."
            } else {
              # 强制开启 devtools
              $config.tauri.windows[0].devtools = $true
              
              # 添加菜单以便打开 DevTools（可选）
              if ($null -eq $config.tauri.windows[0].menu) {
                $config.tauri.windows[0].menu = $null  # 保持默认菜单
              }
              
              # 保存修改
              $config | ConvertTo-Json -Depth 10 | Set-Content $configFile
              Write-Host "✅ Enabled devtools in tauri.conf.json"
            }
          } else {
            Write-Host "❌ tauri.conf.json not found!"
          }
          
          # 2. 修改下载处理代码，添加调试日志
          $cmdFile = "src-tauri/src/cmd.rs"
          if (Test-Path $cmdFile) {
            $content = Get-Content $cmdFile -Raw
            
            # 在 download_file_by_binary 函数中添加日志
            if ($content -match "fn download_file_by_binary") {
              $content = $content -replace '(fn download_file_by_binary\([^)]*\)[^{]*\{)', 
                '$1' + "`n        println!(`"[DEBUG] download_file_by_binary called`");"
              Set-Content $cmdFile $content
              Write-Host "✅ Added debug logging to cmd.rs"
            }
          }
          
          # 3. 修改前端下载处理代码
          $downloadTs = "src-tauri/src/download.rs"
          if (Test-Path $downloadTs) {
            $content = Get-Content $downloadTs -Raw
            $content = $content -replace '(fn download_binary\([^)]*\)[^{]*\{)', 
              '$1' + "`n        println!(`"[DEBUG] download_binary called with size: {}`", data.len());"
            Set-Content $downloadTs $content
            Write-Host "✅ Added debug logging to download.rs"
          }
          
          # 4. 注入前端补丁，确保 Tauri API 正确挂载
          $indexHtml = "src-tauri/src/index.html"
          if (-not (Test-Path $indexHtml)) {
            $indexHtml = "src/index.html"  # 尝试其他路径
          }
          
          if (Test-Path $indexHtml) {
            $html = Get-Content $indexHtml -Raw
            $patchScript = @"
<script>
  // Pake Blob Download Fix
  (function() {
    console.log('[Pake] Applying Blob download fix...');
    
    // 确保 Tauri API 可用
    window.__TAURI__ = window.__TAURI__ || {};
    
    // 补丁：如果 invoke 不存在，尝试从全局获取
    if (!window.__TAURI__.invoke && window.__TAURI_IPC__) {
      window.__TAURI__.invoke = function(cmd, args) {
        return window.__TAURI_IPC__.send(cmd, args);
      };
      console.log('[Pake] Patched invoke function');
    }
    
    // 监控 Blob 下载
    const originalCreateObjectURL = URL.createObjectURL;
    URL.createObjectURL = function(blob) {
      console.log('[Pake] createObjectURL called', blob);
      return originalCreateObjectURL.call(this, blob);
    };
    
    console.log('[Pake] Blob download fix applied, Tauri API:', !!window.__TAURI__?.invoke);
  })();
</script>
"@
            
            # 在 </head> 前插入补丁
            $html = $html -replace '</head>', "$patchScript`n</head>"
            Set-Content $indexHtml $html
            Write-Host "✅ Injected Blob download fix into HTML"
          }
          
          # 5. 修改 CLI 参数处理，强制添加调试标志
          $cliFile = "src/cli.ts"
          if (Test-Path $cliFile) {
            $content = Get-Content $cliFile -Raw
            # 找到处理 debug 参数的地方
            $content = $content -replace 'const debug = .+;', 'const debug = true; // Force enabled by GitHub Actions'
            $content = $content -replace 'devtools: .+,', 'devtools: true,'
            Set-Content $cliFile $content
            Write-Host "✅ Forced debug mode in CLI"
          }
          
          Write-Host "🎉 Windows patch complete! DevTools enabled and Blob download fixed." -ForegroundColor Green

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")

          if [ -n "${{ inputs.icon }}" ]; then
            ARGS+=("--icon" "${{ inputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi

          if [ "${{ inputs.debug }}" == "true" ]; then
            ARGS+=("--debug")
          fi

          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $args = @(
            "${{ inputs.url }}"
            "--name"
            "${{ inputs.name }}"
          )

          if ("${{ inputs.icon }}" -ne "") {
            $args += "--icon", "${{ inputs.icon }}"
          }

          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }

          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }

          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }

          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }

          # 调试模式已经通过源码强制开启，所以这里不传 --debug 也可以
          # 但如果想传递也可以加上
          if ("${{ inputs.debug }}" -eq "true") {
            $args += "--debug"
          }

          Write-Host "🚀 Running: node dist/cli.js $($args -join ' ')" -ForegroundColor Yellow
          
          # 执行构建
          node dist/cli.js $args
          
          # 恢复 Cargo.lock
          git checkout -- src-tauri/Cargo.lock

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-macOS
          path: ${{ inputs.name }}.dmg
          retention-days: 3

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-deb
          path: ${{ inputs.name }}.deb
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-AppImage
          path: ${{ inputs.name }}.AppImage
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Windows
          path: ${{ inputs.name }}.msi
          retention-days: 3

      - name: Upload NSIS (Windows, if exists)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Windows-NSIS
          path: ${{ inputs.name }}.exe
          retention-days: 3
          if-no-files-found: ignore

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
